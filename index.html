<!DOCTYPE html>

<link rel="apple-touch-startup-image" href="img/icon.svg" media="(device-width: 320px)">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">

<body>

<script src="js/backup.js"></script>
<script src="js/templates.js"></script>

<script>

  navigator.serviceWorker.register('sw.js').catch(e => console.log('SW reg failed:', e));
}
