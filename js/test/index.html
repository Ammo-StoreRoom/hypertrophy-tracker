<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Runner - Hypertrophy Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080810;
  --card: #111122;
  --card-border: #1c1c36;
  --accent: #E94560;
  --green: #22c55e;
  --gold: #facc15;
  --blue: #60a5fa;
  --orange: #d97706;
  --text: #e4e4e7;
  --dim: #71717a;
  --muted: #3f3f56;
  --white: #fff;
  --font: 'DM Sans', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  min-height: 100vh;
  padding: 20px;
}
.container { max-width: 900px; margin: 0 auto; }
header {
  text-align: center;
  padding: 40px 20px;
  border-bottom: 2px solid var(--card-border);
  margin-bottom: 30px;
}
h1 {
  font-size: 32px;
  font-weight: 900;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 10px;
}
.subtitle { color: var(--dim); font-size: 14px; }

/* Controls */
.controls {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-bottom: 30px;
  flex-wrap: wrap;
}
.btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 12px 24px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: var(--font);
  transition: transform 0.1s, opacity 0.15s;
}
.btn:active { transform: scale(0.97); }
.btn-secondary {
  background: var(--card);
  border: 1px solid var(--card-border);
  color: var(--text);
}
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Stats Grid */
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 16px;
  margin-bottom: 30px;
}
.stat-card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 12px;
  padding: 20px;
  text-align: center;
}
.stat-val {
  font-size: 36px;
  font-weight: 900;
  font-family: var(--mono);
  margin-bottom: 4px;
}
.stat-val.total { color: var(--blue); }
.stat-val.passed { color: var(--green); }
.stat-val.failed { color: var(--accent); }
.stat-val.skipped { color: var(--gold); }
.stat-label {
  font-size: 11px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* Test Suites */
.suites { display: flex; flex-direction: column; gap: 12px; }
.suite {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 10px;
  overflow: hidden;
}
.suite-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 18px;
  cursor: pointer;
  transition: background 0.15s;
}
.suite-header:hover { background: rgba(255,255,255,0.02); }
.suite-name { font-weight: 700; font-size: 15px; }
.suite-status {
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 20px;
  font-weight: 600;
}
.suite-status.pass { background: rgba(34,197,94,0.15); color: var(--green); }
.suite-status.fail { background: rgba(233,69,96,0.15); color: var(--accent); }
.suite-status.pending { background: rgba(113,113,122,0.15); color: var(--dim); }

/* Test List */
.suite-tests {
  border-top: 1px solid var(--card-border);
  display: none;
}
.suite.expanded .suite-tests { display: block; }
.test {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 18px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}
.test:last-child { border-bottom: none; }
.test-name { font-size: 13px; }
.test-status {
  font-size: 11px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 6px;
}
.test-status .icon { font-size: 14px; }
.test-status.pass { color: var(--green); }
.test-status.fail { color: var(--accent); }
.test-status.skip { color: var(--gold); }
.test-error {
  font-size: 11px;
  color: var(--accent);
  margin-top: 4px;
  font-family: var(--mono);
  padding: 8px;
  background: rgba(233,69,96,0.08);
  border-radius: 4px;
}

/* Console Output */
.console {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 10px;
  padding: 18px;
  margin-top: 20px;
  font-family: var(--mono);
  font-size: 12px;
  max-height: 300px;
  overflow-y: auto;
}
.console-header {
  font-weight: 700;
  margin-bottom: 10px;
  color: var(--dim);
  font-size: 11px;
  text-transform: uppercase;
}
.console-line { margin: 4px 0; }
.console-line.error { color: var(--accent); }
.console-line.success { color: var(--green); }
.console-line.info { color: var(--blue); }

/* Loading */
.loading {
  text-align: center;
  padding: 40px;
  color: var(--dim);
}
.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--card-border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Empty State */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--dim);
}
.empty-icon { font-size: 48px; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🧪 Test Runner</h1>
    <p class="subtitle">Hypertrophy Tracker Unit Tests</p>
  </header>

  <div class="controls">
    <button class="btn" id="run-btn" onclick="runTests()">▶ Run All Tests</button>
    <button class="btn btn-secondary" onclick="clearResults()">Clear</button>
    <button class="btn btn-secondary" onclick="window.open('visual.html', '_blank')">Visual Tests</button>
    <button class="btn btn-secondary" onclick="window.close()">Close</button>
  </div>

  <div class="stats" id="stats">
    <div class="stat-card">
      <div class="stat-val total" id="stat-total">0</div>
      <div class="stat-label">Total Tests</div>
    </div>
    <div class="stat-card">
      <div class="stat-val passed" id="stat-passed">0</div>
      <div class="stat-label">Passed</div>
    </div>
    <div class="stat-card">
      <div class="stat-val failed" id="stat-failed">0</div>
      <div class="stat-label">Failed</div>
    </div>
    <div class="stat-card">
      <div class="stat-val skipped" id="stat-skipped">0</div>
      <div class="stat-label">Skipped</div>
    </div>
  </div>

  <div class="loading" id="loading" style="display: none;">
    <div class="spinner"></div>
    <p>Running tests...</p>
  </div>

  <div class="suites" id="suites"></div>

  <div class="console" id="console" style="display: none;">
    <div class="console-header">Console Output</div>
    <div id="console-content"></div>
  </div>
</div>

<!-- Load test framework -->
<script src="test-framework.js"></script>

<!-- Mock dependencies -->
<script>
// Mock global dependencies that tests expect
const MUSCLE_GROUPS = {
  Chest: ['Bench Press', 'Incline Press'],
  Back: ['Pull-Ups', 'Rows'],
  Legs: ['Squat', 'Deadlift'],
  Shoulders: ['Overhead Press'],
  Arms: ['Curls', 'Extensions'],
  Core: ['Planks']
};

const PROGRAMS = {
  standard: {
    rampup: { 'Week 1': { 'Mon': [] }, 'Week 2': {} },
    ppl: [{ key: 'push', label: 'Push', exercises: [] }]
  }
};

// Mock Storage
const Storage = {
  get: async (key, fallback) => fallback,
  set: async (key, val) => {},
  getPin: () => '01131998'
};

// Mock Coach
const Coach = {
  analyzeTrainingState: () => ({ insights: [], warnings: [] }),
  detectPlateaus: () => [],
  shouldDeload: () => ({ shouldDeload: false }),
  generateTips: () => [],
  analyzeRecovery: () => ({ score: 80 }),
  suggestWorkoutAdjustments: () => ({ adjustments: [] }),
  answerQuestion: () => 'Test answer'
};
</script>

<!-- Load utilities under test -->
<script src="../utils/calculations.js"></script>
<script src="../utils/formatters.js"></script>

<!-- Load test files -->
<script src="calculations.test.js"></script>
<script src="formatters.test.js"></script>
<script src="coach.test.js"></script>
<script src="state.test.js"></script>
<script src="validation.test.js"></script>

<script>
// Test runner UI
async function runTests() {
  const runBtn = document.getElementById('run-btn');
  const loading = document.getElementById('loading');
  const suitesContainer = document.getElementById('suites');
  const consoleEl = document.getElementById('console');
  
  runBtn.disabled = true;
  loading.style.display = 'block';
  suitesContainer.innerHTML = '';
  consoleEl.style.display = 'block';
  
  // Clear previous results
  Test.results = [];
  Test.suites.forEach(s => s.tests.forEach(t => t.status = 'pending'));
  
  const startTime = performance.now();
  
  // Run all tests
  try {
    await Test.runAll();
  } catch (e) {
    logConsole('Test run failed: ' + e.message, 'error');
  }
  
  const duration = Math.round(performance.now() - startTime);
  
  // Update stats
  const stats = Test.getStats();
  document.getElementById('stat-total').textContent = stats.total;
  document.getElementById('stat-passed').textContent = stats.passed;
  document.getElementById('stat-failed').textContent = stats.failed;
  document.getElementById('stat-skipped').textContent = stats.skipped;
  
  // Render suites
  renderSuites();
  
  logConsole(`Test run completed in ${duration}ms`, 'success');
  logConsole(`${stats.passed} passed, ${stats.failed} failed, ${stats.skipped} skipped`, 'info');
  
  loading.style.display = 'none';
  runBtn.disabled = false;
}

function renderSuites() {
  const container = document.getElementById('suites');
  container.innerHTML = '';
  
  Test.suites.forEach((suite, index) => {
    const suiteEl = document.createElement('div');
    suiteEl.className = 'suite';
    suiteEl.id = `suite-${index}`;
    
    const passed = suite.tests.filter(t => t.status === 'passed').length;
    const failed = suite.tests.filter(t => t.status === 'failed').length;
    const total = suite.tests.length;
    
    let statusClass = 'pending';
    let statusText = 'Pending';
    if (failed > 0) { statusClass = 'fail'; statusText = `${failed} failed`; }
    else if (passed === total && total > 0) { statusClass = 'pass'; statusText = 'Passed'; }
    else if (passed > 0) { statusClass = 'pending'; statusText = `${passed}/${total}`; }
    
    suiteEl.innerHTML = `
      <div class="suite-header" onclick="toggleSuite(${index})">
        <span class="suite-name">${suite.name}</span>
        <span class="suite-status ${statusClass}">${statusText}</span>
      </div>
      <div class="suite-tests">
        ${suite.tests.map((test, ti) => `
          <div class="test">
            <span class="test-name">${test.name}</span>
            <span class="test-status ${test.status}">
              <span class="icon">${getStatusIcon(test.status)}</span>
              ${test.status}
            </span>
          </div>
          ${test.error ? `<div class="test-error">${test.error.message || test.error}</div>` : ''}
        `).join('')}
      </div>
    `;
    
    container.appendChild(suiteEl);
  });
}

function toggleSuite(index) {
  const suite = document.getElementById(`suite-${index}`);
  suite.classList.toggle('expanded');
}

function getStatusIcon(status) {
  if (status === 'passed') return '✓';
  if (status === 'failed') return '✗';
  if (status === 'skipped') return '○';
  return '•';
}

function logConsole(message, type = 'info') {
  const content = document.getElementById('console-content');
  const line = document.createElement('div');
  line.className = `console-line ${type}`;
  line.textContent = message;
  content.appendChild(line);
}

function clearResults() {
  document.getElementById('suites').innerHTML = '';
  document.getElementById('console-content').innerHTML = '';
  document.getElementById('console').style.display = 'none';
  document.getElementById('stat-total').textContent = '0';
  document.getElementById('stat-passed').textContent = '0';
  document.getElementById('stat-failed').textContent = '0';
  document.getElementById('stat-skipped').textContent = '0';
}

// Auto-run if ?run is in URL
if (window.location.search.includes('run')) {
  window.addEventListener('load', runTests);
}
</script>
</body>
</html>
